syntax = "proto3";

package types_ontology;
option go_package = "proto/types_ontology";

// GET: /v1/apis

message ResponseGetApis {
    message Api {
        int64 id = 1;
        string endpoint = 2;
        string method = 3;
        string protocol = 4;
        bool is_internal = 5;
        string created_at = 6;
    }

    message Pagination {
        int32 current_page = 1;
        int32 page_size = 2;
        int64 total_count = 3;
        int32 total_pages = 4;
    }

    string code = 1;
    string message = 2;
    repeated Api result = 3;
    Pagination pagination = 4;
}
