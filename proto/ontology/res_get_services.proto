syntax = "proto3";

package types_ontology;
option go_package = "proto/types_ontology";

// GET: /v1/services

message ResponseGetServices {
    message Service {
        int64 id = 1;
        string code = 2;
        string name = 3;
        string criticality_level = 4;
        string updated_at = 5;
        string repository_url = 6;
    }

    message Pagination {
        int32 current_page = 1;
        int32 page_size = 2;
        int64 total_count = 3;
        int32 total_pages = 4;
    }

    string code = 1;
    string message = 2;
    repeated Service data = 3;
    Pagination pagination = 4;
}
