syntax = "proto3";

package types_ontology;
option go_package = "proto/types_ontology";

// GET: /v1/features/instances

message ResponseGetFeatureInstances {
    message FeatureInstance {
        string id = 1;
        int64 feature_id = 2;
        string status = 3;
        string started_at = 4;
        string completed_at = 5;
    }

    message Pagination {
        string next_cursor = 1;
        string previous_cursor = 2;
        bool has_next = 3;
        bool has_previous = 4;
        int32 limit = 5;
    }

    string code = 1;
    string message = 2;
    repeated FeatureInstance result = 3;
    Pagination pagination = 4;
}
