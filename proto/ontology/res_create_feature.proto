syntax = "proto3";

package types_ontology;
option go_package = "proto/types_ontology";

// POST: /v1/features

message ResponseCreateFeature {
    message Feature {
        int64 id = 1;
        string code = 2;
        string name = 3;
        string description = 4;
        bool is_active = 5;
        string created_at = 6;
        string updated_at = 7;
    }

    string code = 1;
    string message = 2;
    Feature result = 3;
}
