syntax = "proto3";

package types_ontology;
option go_package = "proto/types_ontology";

// GET: /v1/kpi-relationships

message ResponseGetKpiRelationships {
    message KpiRelationship {
        int64 id = 1;
        int64 kpi_id = 2;
        string relation_type = 3;
        string target_type = 4;
        int64 target_id = 5;
        string weight_set_by = 6;
        string weight_reviewed_by = 7;
        string weight_reviewed_at = 8;
        float weight = 9;
        string created_at = 10;
        string updated_at = 11;
    }

    message Pagination {
        int32 current_page = 1;
        int32 page_size = 2;
        int64 total_count = 3;
        int32 total_pages = 4;
    }

    string code = 1;
    string message = 2;
    repeated KpiRelationship result = 3;
    Pagination pagination = 4;
}
